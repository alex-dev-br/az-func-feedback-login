quarkus.azure-functions.app-name=func-feedback-login
quarkus.azure-functions.runtime.java-version=25
quarkus.http.root-path=api


mp.jwt.verify.issuer=https://feedback-login.com.br/issuer
smallrye.jwt.new-token.issuer=https://feedback-login.com.br/issuer
#quarkus.native.resources.includes=publicKey.pem

smallrye.jwt.new-token.key-encryption-algorithm=RSA-OAEP-256
smallrye.jwt.new-token.content-encryption-algorithm=A256CBC-HS512

#24horas
smallrye.jwt.new-token.lifespan=43200

#mp.jwt.verify.publickey.location=publicKey.pem
#smallrye.jwt.sign.key.location=rsaPrivateKey.pem

# URL do seu Azure Key Vault 
quarkus.azure.keyvault.secret.endpoint=${QUARKUS_AZURE_KEYVAULT_SECRET_ENDPOINT}

# Como deve ficar
mp.jwt.verify.publickey=${kv//jwt-public-key:}
smallrye.jwt.sign.key=${kv//jwt-private-key:}

%test.mp.jwt.verify.publickey=mock-key
%test.smallrye.jwt.sign.key=mock-key

quarkus.otel.metrics.enabled=true
quarkus.otel.logs.enabled=true

# Desabilita o exportador padrão OTLP (que tenta conectar no localhost:4317)
quarkus.otel.traces.exporter=none
quarkus.otel.metrics.exporter=none
quarkus.otel.logs.exporter=none

# Prefixo para as métricas da aplicação
feedback.metrics.prefix=feedback.login.

# (A Connection String do Azure está sendo setada diretamente via env QUARKUS_OTEL_AZURE_APPLICATIONINSIGHTS_CONNECTION_STRING)

# Configurações do Banco de Dados H2 (Memória)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:feedbackdb
quarkus.datasource.username=sa
quarkus.datasource.password=password

# Configurações do Hibernate (Delega para o Flyway)
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Configurações do Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

quarkus.log.category."com.azure".level=DEBUG
quarkus.log.category."com.azure.identity".level=DEBUG
quarkus.log.category."com.azure.security.keyvault".level=DEBUG