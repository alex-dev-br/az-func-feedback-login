quarkus.azure-functions.app-name=func-feedback-login
quarkus.azure-functions.runtime.java-version=25
quarkus.http.root-path=api

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://feedback-login.com.br/issuer
smallrye.jwt.new-token.issuer=https://feedback-login.com.br/issuer
quarkus.native.resources.includes=publicKey.pem

smallrye.jwt.new-token.key-encryption-algorithm=RSA-OAEP-256
smallrye.jwt.new-token.content-encryption-algorithm=A256CBC-HS512

#24horas
smallrye.jwt.new-token.lifespan=43200

smallrye.jwt.sign.key.location=rsaPrivateKey.pem
smallrye.jwt.encrypt.key.location=publicKey.pem

